<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/new.css">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>


<body>
    <header>
        <nav>
            <a href="index.html">Главная</a>
            <a href="form.html">Форма</a>
        </nav>
    </header>

    <main class="container">
        <h1 class="form-title">Регистрация нового пользователя</h1>

        <form action="#" method="POST" class="reg-form">
            <fieldset class="group">
                <legend>Личная информация</legend>

                <label for="name">Имя:</label>
                <input type="text" id="name" name="name" placeholder="Иван Иванов" required>

                <label for="pass">Пароль:</label>
                <input type="password" id="pass" name="pass" placeholder="Мин. 8 символов" required>

                <label for="birthdate">Дата рождения:</label>
                <input type="date" id="birthdate" name="birthdate" required disabled>

                <p>Пол:</p>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male" checked> Мужской</label>
                    <label><input type="radio" name="gender" value="female"> Женский</label>
                </div>
            </fieldset>

            <fieldset class="group">
                <legend>Контактные данные</legend>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>

                <label for="phone">Телефон:</label>
                <input type="tel" id="phone" name="phone" placeholder="+7 (999) 000-00-00" required>

                <label for="contact_time">Удобный интервал для связи:</label>
                <select id="contact_time" name="contact_time">
                    <option value="morning">Утро</option>
                    <option value="day">День</option>
                    <option value="evening">Вечер</option>
                    <option value="night">Ночь</option>
                </select>
            </fieldset>

            <button type="submit">
                <span>📩</span> Зарегистрироваться
            </button>
        </form>
    </main>

    <footer class="main-footer">
        <p>© 2026 Лабораторная работа Георгия. Все права защищены.</p>
    </footer>
</body>
</html>
